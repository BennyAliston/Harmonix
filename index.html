<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HARMONIX — Retro Music Studio</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="rack-frame">

        <!-- ════════ HEADER + NAV ════════ -->
        <div class="rack-unit">
            <div class="rack-screw tl"></div>
            <div class="rack-screw tr"></div>

            <div class="header-top">
                <h1 class="logo">HARMONIX</h1>
                <span class="version-badge">RETRO MUSIC STUDIO v3.0</span>
            </div>
            <nav class="rack-nav">
                <button class="nav-tab active" data-page="sequencer">
                    <span class="nav-led"></span> SEQUENCER
                </button>
                <button class="nav-tab" data-page="mixer">
                    <span class="nav-led"></span> MIXER
                </button>
                <button class="nav-tab" data-page="keys">
                    <span class="nav-led"></span> KEYS
                </button>
                <button class="nav-tab" data-page="effects">
                    <span class="nav-led"></span> EFFECTS
                </button>
            </nav>

            <div class="rack-screw bl"></div>
            <div class="rack-screw br"></div>
        </div>

        <!-- ════════ TRANSPORT + OSCILLOSCOPE ════════ -->
        <div class="rack-unit">
            <div class="rack-screw tl"></div>
            <div class="rack-screw tr"></div>

            <div class="transport-row">
                <button class="rack-btn" id="btn-play" data-tooltip="Start sequencer playback (Space)">
                    <span class="btn-led"></span> &#9654; PLAY
                </button>
                <button class="rack-btn active" id="btn-stop" data-tooltip="Stop playback and reset (Space)">
                    <span class="btn-led"></span> &#9632; STOP
                </button>
                <button class="rack-btn" id="btn-loop" data-tooltip="Toggle pattern looping">
                    <span class="btn-led"></span> &#10227; LOOP
                </button>
                <div class="bpm-group" data-tooltip="Tempo in beats per minute">
                    <label>BPM</label>
                    <input type="range" id="bpm-slider" min="60" max="180" value="120" style="width:120px;">
                    <div class="seg-display" id="bpm-display">120</div>
                </div>
                <div class="bpm-group" data-tooltip="Swing feel (0% = straight)">
                    <label>SWING</label>
                    <input type="range" id="swing-slider" min="0" max="100" value="0" style="width:80px;">
                    <div class="seg-display" id="swing-display" style="min-width:34px;">0%</div>
                </div>
            </div>

            <div class="oscilloscope-wrap">
                <div id="oscilloscope"></div>
                <div class="scanlines"></div>
                <div class="crt-glow"></div>
            </div>

            <div class="rack-screw bl"></div>
            <div class="rack-screw br"></div>
        </div>

        <!-- ════════ PAGE: SEQUENCER ════════ -->
        <div id="page-sequencer" class="page active">
            <div class="rack-unit">
                <div class="rack-screw tl"></div>
                <div class="rack-screw tr"></div>

                <div class="module-header">
                    <span class="module-title">STEP SEQUENCER</span>
                    <div class="module-controls">
                        <div class="select-group">
                            <label>PRESET</label>
                            <select id="preset-dropdown" class="rack-select"></select>
                        </div>
                        <button id="btn-clear" class="rack-btn small" data-tooltip="Clear all steps">CLEAR</button>
                        <button id="btn-random" class="rack-btn small" data-tooltip="Randomize pattern">RANDOM</button>
                    </div>
                </div>
                <div class="neon-sep"></div>
                <div id="sequencer-container" style="overflow-x:auto;"></div>

                <div class="rack-screw bl"></div>
                <div class="rack-screw br"></div>
            </div>
        </div>

        <!-- ════════ PAGE: MIXER ════════ -->
        <div id="page-mixer" class="page">
            <div class="rack-unit">
                <div class="rack-screw tl"></div>
                <div class="rack-screw tr"></div>

                <div class="module-header">
                    <span class="module-title">CHANNEL MIXER</span>
                </div>
                <div class="neon-sep"></div>
                <div id="mixer-container" class="mixer-container"></div>

                <div class="rack-screw bl"></div>
                <div class="rack-screw br"></div>
            </div>
        </div>

        <!-- ════════ PAGE: KEYS ════════ -->
        <div id="page-keys" class="page">
            <div class="rack-unit">
                <div class="rack-screw tl"></div>
                <div class="rack-screw tr"></div>

                <div class="module-header">
                    <span class="module-title">KEYBOARD</span>
                    <div class="module-controls">
                        <div class="select-group">
                            <label>KEY</label>
                            <select id="key-dropdown" class="rack-select"></select>
                        </div>
                        <div class="select-group">
                            <label>SCALE</label>
                            <select id="scale-dropdown" class="rack-select"></select>
                        </div>
                    </div>
                </div>
                <div class="neon-sep"></div>
                <div class="keyboard-scroll">
                    <div class="keyboard" id="keyboard"></div>
                </div>

                <div class="rack-screw bl"></div>
                <div class="rack-screw br"></div>
            </div>
        </div>

        <!-- ════════ PAGE: EFFECTS ════════ -->
        <div id="page-effects" class="page">
            <div class="rack-unit">
                <div class="rack-screw tl"></div>
                <div class="rack-screw tr"></div>

                <div class="module-header">
                    <span class="module-title">MASTER EFFECTS</span>
                </div>
                <div class="neon-sep"></div>
                <div id="effects-row" class="effects-row"></div>

                <div class="rack-screw bl"></div>
                <div class="rack-screw br"></div>
            </div>

            <div class="rack-unit">
                <div class="rack-screw tl"></div>
                <div class="rack-screw tr"></div>

                <div class="module-header">
                    <span class="module-title">EXPORT</span>
                </div>
                <div class="neon-sep"></div>
                <div class="export-controls">
                    <button id="btn-export" class="rack-btn export-btn"
                        data-tooltip="Record one loop and export as WAV file">
                        <span class="rec-led"></span> RECORD &amp; EXPORT WAV
                    </button>
                    <div class="seg-display export-status" id="export-status">READY</div>
                </div>

                <div class="rack-screw bl"></div>
                <div class="rack-screw br"></div>
            </div>
        </div>

    </div>

    <script src="js/poweraudio.js"></script>
    <script src="js/harmonix-engine.js"></script>
    <script src="js/harmonix-ui.js"></script>
    <script src="js/harmonix-app.js"></script>
</body>

</html>
